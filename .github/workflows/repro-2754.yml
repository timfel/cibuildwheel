name: Reproduce issue 2754

on:
  push:
  workflow_dispatch:
    inputs:
      iterations:
        description: Number of full pytest runs
        required: true
        type: number
        default: 1
      pytest_numprocesses:
        description: pytest-xdist worker count
        required: false
        type: string
        default: '4'
      unique_uv_cache:
        description: Use a unique UV_CACHE_DIR per iteration
        required: false
        type: boolean
        default: false
      graalpython_artifact_url:
        description: Optional GraalPython artifact URL to consume for gp312_250-win_amd64
        required: false
        type: string
      graalpython_artifact_repo:
        description: Repo owning the artifact URL
        required: false
        type: string
        default: timfel/graalpython

permissions: {}

env:
  REPRO_RUNS_ON: windows-latest
  REPRO_ITERATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.iterations || '1' }}
  REPRO_PYTHON: '3.13'
  REPRO_PYTEST_NUMPROCESSES: ${{ github.event_name == 'workflow_dispatch' && inputs.pytest_numprocesses || '4' }}
  REPRO_UNIQUE_UV_CACHE: ${{ github.event_name == 'workflow_dispatch' && inputs.unique_uv_cache || 'false' }}
  REPRO_UV_VERSION: '0.10.7'
  REPRO_GRAALPY_ARTIFACT_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.graalpython_artifact_url || '' }}
  REPRO_GRAALPY_ARTIFACT_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.graalpython_artifact_repo || 'timfel/graalpython' }}

concurrency:
  group: repro-2754-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reproduce:
    name: Reproduce #2754 on ${{ env.REPRO_RUNS_ON }}
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ env.REPRO_PYTHON }}
    - uses: astral-sh/setup-uv@v7
      with:
        version: ${{ env.REPRO_UV_VERSION }}
    - name: Install dependencies
      run: uv sync --no-dev --group test
    - name: Download GraalPy artifact override
      if: env.REPRO_GRAALPY_ARTIFACT_URL != ''
      shell: pwsh
      env:
        CROSS_REPO_GITHUB_TOKEN: ${{ secrets.CROSS_REPO_GITHUB_TOKEN }}
      run: |
        $ErrorActionPreference = 'Stop'

        if (-not $env:CROSS_REPO_GITHUB_TOKEN) {
          throw 'Missing CROSS_REPO_GITHUB_TOKEN secret for cross-repo artifact download.'
        }
        $token = $env:CROSS_REPO_GITHUB_TOKEN.Trim()
        if ($env:REPRO_GRAALPY_ARTIFACT_URL -notmatch '/artifacts/(\d+)') {
          throw "Could not extract artifact id from URL: $env:REPRO_GRAALPY_ARTIFACT_URL"
        }

        $artifactId = $Matches[1]
        $downloadUrl = "https://api.github.com/repos/$env:REPRO_GRAALPY_ARTIFACT_REPO/actions/artifacts/$artifactId/zip"
        $artifactZip = Join-Path $PWD 'graalpython-artifact.zip'
        $artifactRoot = Join-Path $PWD 'graalpython-artifact'

        Invoke-WebRequest `
          -Headers @{
            Authorization = "Bearer $token"
            Accept = 'application/vnd.github+json'
          } `
          -Uri $downloadUrl `
          -OutFile $artifactZip

        Expand-Archive -LiteralPath $artifactZip -DestinationPath $artifactRoot -Force

        $artifactTar = Get-ChildItem -Path $artifactRoot -Recurse -File -Filter *.tar | Select-Object -First 1
        if (-not $artifactTar) {
          throw 'Expected a .tar file inside the downloaded GraalPython artifact.'
        }

        tar -xf $artifactTar.FullName -C $artifactRoot

        $graalpyHome = Get-ChildItem -Path $artifactRoot -Recurse -Directory |
          Where-Object { $_.Name -eq 'GRAALPY_NATIVE_STANDALONE' } |
          Select-Object -First 1
        if (-not $graalpyHome) {
          throw 'Could not locate GRAALPY_NATIVE_STANDALONE in the downloaded artifact.'
        }

        $overrideExe = Join-Path $graalpyHome.FullName 'bin\graalpy.exe'
        if (-not (Test-Path $overrideExe)) {
          throw "Could not locate graalpy.exe at $overrideExe"
        }

        "CIBW_GRAALPY_WINDOWS_EXE_GP312_250_WIN_AMD64=$overrideExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "REPRO_GRAALPY_OVERRIDE_HOME=$($graalpyHome.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "- graalpython artifact: $env:REPRO_GRAALPY_ARTIFACT_URL" >> $env:GITHUB_STEP_SUMMARY
        "- graalpython override home: $($graalpyHome.FullName)" >> $env:GITHUB_STEP_SUMMARY
    - name: Set CIBW_ENABLE
      shell: bash
      run: |
        CIBW_ENABLE=$(uv run --no-sync python -c 'import sys, test.utils as c; sys.stdout.write(c.DEFAULT_CIBW_ENABLE)')
        CIBW_ENABLE+=" graalpy"
        echo "CIBW_ENABLE=${CIBW_ENABLE}" >> $GITHUB_ENV
    - name: Generate a sample project
      run: uv run --no-sync -m test.test_projects test.test_0_basic.basic_project sample_proj
    - name: Run a sample build (GitHub Action)
      uses: ./
      with:
        package-dir: sample_proj
        output-dir: wheelhouse
      env:
        CIBW_BUILD_FRONTEND: 'build[uv]'
    - name: Reproduce issue 2754 closer to PR #2741
      shell: pwsh
      env:
        CIBW_TEST_REPRO_2754_ORIGINAL_PR_MODE: "1"
      run: |
        $ErrorActionPreference = 'Stop'

        $iterations = [int] '${{ env.REPRO_ITERATIONS }}'
        $pytestArgs = @(
          '-m', 'not serial and not pyodide and not android and not ios',
          '--numprocesses=${{ env.REPRO_PYTEST_NUMPROCESSES }}',
          '-x',
          '--durations', '0',
          '--timeout=2400',
          '-vv',
          'test/test_0_basic.py',
          'test/test_before_test.py'
        )
        $root = Join-Path $PWD 'repro-2754'
        $logsDir = Join-Path $root 'logs'

        New-Item -ItemType Directory -Force $root | Out-Null
        New-Item -ItemType Directory -Force $logsDir | Out-Null

        "# issue 2754 repro`n`n- runner: ${{ env.REPRO_RUNS_ON }}`n- python: ${{ env.REPRO_PYTHON }}`n- uv: ${{ env.REPRO_UV_VERSION }}`n- pytest workers: ${{ env.REPRO_PYTEST_NUMPROCESSES }}`n- unique uv cache: ${{ env.REPRO_UNIQUE_UV_CACHE }}`n- iterations: $iterations`n- command: pytest $($pytestArgs -join ' ')" >> $env:GITHUB_STEP_SUMMARY

        for ($iteration = 1; $iteration -le $iterations; $iteration++) {
          $iterationName = 'iteration-{0:d3}' -f $iteration
          $logPath = Join-Path $logsDir ($iterationName + '.log')

          if ('${{ env.REPRO_UNIQUE_UV_CACHE }}' -eq 'true') {
            $iterationCache = Join-Path $root ('uv-cache-' + $iterationName)
            New-Item -ItemType Directory -Force $iterationCache | Out-Null
            $env:UV_CACHE_DIR = $iterationCache
          } else {
            if (Test-Path Env:UV_CACHE_DIR) { Remove-Item Env:UV_CACHE_DIR }
          }

          Write-Host "::group::Repro $iterationName"
          & uv run --no-sync python -m pytest @pytestArgs *>&1 | Tee-Object -FilePath $logPath
          $exitCode = $LASTEXITCODE
          Write-Host "::endgroup::"

          if ($exitCode -ne 0) {
            "- failed on $iterationName" >> $env:GITHUB_STEP_SUMMARY
            exit $exitCode
          }
        }

        "- all iterations passed" >> $env:GITHUB_STEP_SUMMARY
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: repro-2754-${{ env.REPRO_RUNS_ON }}-original-pr-shape
        path: repro-2754/logs
